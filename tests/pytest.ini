[pytest]
# ============================================================
# pytest Configuration — Legacy to Salesforce Migration Platform
# ============================================================

# Test discovery
testpaths =
    tests

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# ============================================================
# MARKERS
# ============================================================
markers =
    unit: Fast unit tests with no external I/O (always run)
    integration: Integration tests requiring running services (use --integration flag)
    contract: Consumer contract tests for Salesforce API (use --contract flag)
    migration_validation: Post-migration data validation tests (use --validation flag)
    slow: Tests that take more than 10 seconds
    security: Security-focused tests
    smoke: Smoke tests for quick health check

# ============================================================
# ASYNCIO
# ============================================================
asyncio_mode = auto

# ============================================================
# COVERAGE
# ============================================================
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --no-header
    -q
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --cov-branch

# ============================================================
# COVERAGE SOURCE PATHS
# ============================================================
# Configured in .coveragerc or pyproject.toml

# ============================================================
# LOG CAPTURE
# ============================================================
log_cli = false
log_cli_level = WARNING
log_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S

# ============================================================
# WARNINGS
# ============================================================
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# ============================================================
# TIMEOUT
# ============================================================
timeout = 60
timeout_method = thread

# ============================================================
# PARALLEL EXECUTION (pytest-xdist)
# ============================================================
# Use: pytest -n auto (to run in parallel)
# Default: single process

# ============================================================
# ENVIRONMENT VARIABLE DEFAULTS FOR TESTS
# ============================================================
env =
    ENVIRONMENT=test
    LOG_LEVEL=WARNING
    LOG_FORMAT=text
    LEGACY_DB_PASSWORD=test_password
    POSTGRES_PASSWORD=test_password
    SALESFORCE_CLIENT_SECRET=test_secret
    SALESFORCE_PASSWORD=test_sf_password
    SALESFORCE_SECURITY_TOKEN=test_token
    DEV_ENCRYPTION_SEED=test-seed-for-unit-tests
    VAULT_TOKEN=test-vault-token
    FEATURE_FIELD_LEVEL_ENCRYPTION=false
    FEATURE_AUDIT_CHAIN=false
