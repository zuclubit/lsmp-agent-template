---
# Alertmanager Configuration
# Legacy to Salesforce Migration Platform
# Version: 1.1.0
# Last Updated: 2026-03-16
#
# Routing tree:
#   root -> [team=security] -> security-team
#         -> [team=migration, severity=critical] -> pagerduty + slack-critical
#         -> [team=migration, severity=warning] -> slack-migration
#         -> [team=platform, severity=critical] -> pagerduty + slack-critical
#         -> [team=platform, severity=warning] -> slack-platform
#         -> default -> slack-general

global:
  # Default smtp
  smtp_smarthost: "smtp.company.com:587"
  smtp_from: "alertmanager@company.com"
  smtp_auth_username: "alertmanager@company.com"
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp_password

  # HTTP configuration
  http_config:
    follow_redirects: true
    tls_config:
      insecure_skip_verify: false

  # Default timeouts
  resolve_timeout: 5m

  # PagerDuty API URL
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

# ============================================================
# ROUTING TREE
# ============================================================

route:
  group_by: ["alertname", "environment", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-general

  routes:
    # Security alerts — always immediate, separate channel
    - match:
        team: security
      receiver: security-team
      group_wait: 0s
      repeat_interval: 1h
      continue: false

    # Critical migration alerts — PagerDuty + Slack
    - match_re:
        severity: "critical"
        team: "migration"
      receiver: pagerduty-migration-critical
      group_wait: 0s
      repeat_interval: 30m
      routes:
        # Also send to Slack
        - match:
            severity: critical
          receiver: slack-migration-critical
          continue: false

    # Warning migration alerts — Slack only
    - match:
        severity: warning
        team: migration
      receiver: slack-migration-warning
      repeat_interval: 2h

    # Critical platform alerts — PagerDuty + Slack
    - match_re:
        severity: "critical"
        team: "platform"
      receiver: pagerduty-platform-critical
      group_wait: 0s
      repeat_interval: 30m
      routes:
        - match:
            severity: critical
          receiver: slack-platform-critical
          continue: false

    # Warning platform alerts
    - match:
        severity: warning
        team: platform
      receiver: slack-platform-warning
      repeat_interval: 2h

    # Database alerts
    - match:
        team: database
      receiver: slack-platform-warning
      repeat_interval: 1h

    # SLA breaches — always high priority
    - match:
        sla: "24h"
      receiver: pagerduty-migration-critical
      group_wait: 0s
      repeat_interval: 1h

# ============================================================
# INHIBITION RULES
# ============================================================

inhibit_rules:
  # Suppress warning if critical for same alert is firing
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "environment", "source_object"]

  # Suppress migration alerts if the component is reported down
  - source_match:
      alertname: ComponentUnhealthy
    target_match_re:
      alertname: "Migration.*"
    equal: ["environment"]

  # Suppress Salesforce API alerts if Salesforce itself is down
  - source_match:
      alertname: SalesforceAPIErrorSpike
    target_match:
      alertname: MigrationHighErrorRate
    equal: ["environment"]

# ============================================================
# RECEIVERS
# ============================================================

receivers:
  # Default fallback receiver
  - name: slack-general
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_general
        channel: "#migration-alerts-general"
        send_resolved: true
        username: "AlertManager"
        icon_emoji: ":bell:"
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ template "slack.color" . }}'

  # -------------------------------------------------------
  # PagerDuty receivers
  # -------------------------------------------------------

  - name: pagerduty-migration-critical
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty_migration_key
        send_resolved: true
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}error{{ end }}'
        class: "migration"
        group: "migration-platform"
        component: '{{ .CommonLabels.source_object | default "unknown" }}'
        client: "Prometheus AlertManager"
        client_url: "https://grafana.migration.company.com/d/migration-dashboard"
        details:
          environment: '{{ .CommonLabels.environment }}'
          team: '{{ .CommonLabels.team }}'
          runbook: '{{ .CommonAnnotations.runbook }}'
          summary: '{{ .CommonAnnotations.summary }}'
          num_alerts: '{{ len .Alerts }}'
        links:
          - href: '{{ .CommonAnnotations.runbook }}'
            text: "Runbook"
          - href: "https://grafana.migration.company.com/d/migration-dashboard"
            text: "Migration Dashboard"

  - name: pagerduty-platform-critical
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty_platform_key
        send_resolved: true
        severity: critical
        class: "platform"
        group: "migration-platform"
        client: "Prometheus AlertManager"
        details:
          environment: '{{ .CommonLabels.environment }}'
          team: '{{ .CommonLabels.team }}'

  # -------------------------------------------------------
  # Slack receivers
  # -------------------------------------------------------

  - name: slack-migration-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_migration_critical
        channel: "#migration-alerts-critical"
        send_resolved: true
        username: "AlertManager"
        icon_emoji: ":rotating_light:"
        title: |
          [CRITICAL] {{ .GroupLabels.alertname }} in {{ .GroupLabels.environment }}
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Environment:* {{ .CommonLabels.environment }}
          *Team:* {{ .CommonLabels.team }}
          {{ if .CommonAnnotations.runbook }}*Runbook:* <{{ .CommonAnnotations.runbook }}|View Runbook>{{ end }}
          {{ range .Alerts }}
          • *Alert:* {{ .Labels.alertname }} | *Status:* {{ .Status }} | *Since:* {{ .StartsAt.Format "2006-01-02T15:04:05Z" }}
          {{ end }}
        color: "danger"
        actions:
          - type: button
            text: "View Dashboard"
            url: "https://grafana.migration.company.com/d/migration-dashboard"
          - type: button
            text: "View Runbook"
            url: '{{ .CommonAnnotations.runbook }}'

  - name: slack-migration-warning
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_migration
        channel: "#migration-alerts"
        send_resolved: true
        username: "AlertManager"
        icon_emoji: ":warning:"
        title: |
          [WARNING] {{ .GroupLabels.alertname }} in {{ .GroupLabels.environment }}
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
        color: "warning"

  - name: slack-platform-critical
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_platform_critical
        channel: "#platform-alerts-critical"
        send_resolved: true
        username: "AlertManager"
        icon_emoji: ":rotating_light:"
        title: |
          [CRITICAL] {{ .GroupLabels.alertname }} in {{ .GroupLabels.environment }}
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          {{ if .CommonAnnotations.runbook }}*Runbook:* <{{ .CommonAnnotations.runbook }}|View Runbook>{{ end }}
        color: "danger"

  - name: slack-platform-warning
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_platform
        channel: "#platform-alerts"
        send_resolved: true
        username: "AlertManager"
        icon_emoji: ":warning:"
        title: |
          [WARNING] {{ .GroupLabels.alertname }} in {{ .GroupLabels.environment }}
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
        color: "warning"

  # -------------------------------------------------------
  # Security team receiver
  # -------------------------------------------------------

  - name: security-team
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook_security
        channel: "#security-alerts"
        send_resolved: true
        username: "SecurityAlertManager"
        icon_emoji: ":shield:"
        title: |
          [SECURITY] {{ .GroupLabels.alertname }} in {{ .GroupLabels.environment }}
        text: |
          :shield: *Security Alert*
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          {{ if .CommonAnnotations.runbook }}*Runbook:* <{{ .CommonAnnotations.runbook }}|View Runbook>{{ end }}
        color: "danger"
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty_security_key
        send_resolved: true
        severity: critical
        class: "security"
    email_configs:
      - to: "security-oncall@company.com"
        send_resolved: true
        headers:
          Subject: "[SECURITY ALERT] {{ .GroupLabels.alertname }}"

# ============================================================
# TEMPLATES
# ============================================================

templates:
  - /etc/alertmanager/templates/*.tmpl
