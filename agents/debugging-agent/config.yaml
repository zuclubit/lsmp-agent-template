agent:
  name: debugging-agent
  version: "1.0.0"
  model: claude-sonnet-4-6
  role: >
    Read-only diagnostic agent. Queries logs, metrics, pod status, Kafka lag, and
    migration error reports to identify root causes of failures. Never mutates state.
    All API calls are read-only (GET). Produces structured diagnostic reports.
  classification: INTERNAL

security:
  default_policy: DENY
  allowed_skills:
    - debugging
  allowed_tools:
    - api-client-tool
  allowed_mcp_servers:
    - runtime-context-server
    - documentation-server
  forbidden_operations:
    - read_secrets
    - write_credentials
    - execute_arbitrary_code
    - access_other_agent_history
    - mutate_migration_state
    - pause_resume_cancel_runs
    - write_to_any_endpoint
  prompt_injection_protection: true
  output_filtering: true
  pii_masking: true

read_only_enforcement:
  read_only_mode: true
  no_state_mutation: true
  # api-client-tool is restricted to HTTP GET methods only for this agent
  allowed_http_methods:
    - GET
  blocked_http_methods:
    - POST
    - PUT
    - PATCH
    - DELETE

context:
  allowed_context_types:
    - runtime-context
    - project-context
  max_context_tokens: 25000
  context_retention: session_only
  inject_only_relevant: true

mcp_servers:
  allowed:
    - runtime-context-server
    - documentation-server
  rate_limit_per_minute: 20
  require_authentication: true

tools:
  allowed:
    - api-client-tool
  require_sandboxing: true
  max_execution_time_seconds: 30
  log_all_calls: true

input_schema:
  ref: "./schema.json#/definitions/input"
  validate_before_execution: true
  reject_on_validation_failure: true

output_schema:
  ref: "./schema.json#/definitions/output"
  sanitize_before_return: true
  strip_pii: true
  strip_credentials: true

audit:
  log_level: INFO
  log_inputs: true
  log_outputs: true
  log_tool_calls: true
  log_mcp_access: true
  retention_days: 90

halcon:
  enabled: true
  emit_on_completion: true
  metrics:
    - convergence_efficiency
    - decision_density
    - adaptation_utilization
    - final_utility
