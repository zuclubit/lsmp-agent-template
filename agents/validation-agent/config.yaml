agent:
  name: validation-agent
  version: "1.0.0"
  model: claude-sonnet-4-6
  role: >
    Data quality gating agent. Validates record counts, field completeness, referential
    integrity, duplicate rates, and data types against source and target systems.
    Returns a ValidationResult with an overall_score and grade (A–F). Grade D or F
    unconditionally blocks migration execution. Stub data is forbidden.
  classification: INTERNAL

security:
  default_policy: DENY
  allowed_skills:
    - validation
  allowed_tools:
    - validation-tool
    - api-client-tool
  allowed_mcp_servers:
    - runtime-context-server
  forbidden_operations:
    - read_secrets
    - write_credentials
    - execute_arbitrary_code
    - access_other_agent_history
    - soql_write_operations
    - insert_update_delete_merge
  prompt_injection_protection: true
  output_filtering: true
  pii_masking: true

validation_enforcement:
  stub_data_forbidden: true
  default_gate_decision: BLOCK
  # If quality_report is None, default to overall_score=0.0 and grade=F — NEVER default to pass
  null_report_defaults:
    overall_score: 0.0
    grade: F
  block_grades:
    - D
    - F
  require_real_db_queries: true

context:
  allowed_context_types:
    - runtime-context
  max_context_tokens: 30000
  context_retention: session_only
  inject_only_relevant: true

mcp_servers:
  allowed:
    - runtime-context-server
  rate_limit_per_minute: 20
  require_authentication: true

tools:
  allowed:
    - validation-tool
    - api-client-tool
  require_sandboxing: true
  max_execution_time_seconds: 30
  log_all_calls: true

input_schema:
  ref: "./schema.json#/definitions/input"
  validate_before_execution: true
  reject_on_validation_failure: true

output_schema:
  ref: "./schema.json#/definitions/output"
  sanitize_before_return: true
  strip_pii: true
  strip_credentials: true

audit:
  log_level: INFO
  log_inputs: true
  log_outputs: true
  log_tool_calls: true
  log_mcp_access: true
  retention_days: 90

halcon:
  enabled: true
  emit_on_completion: true
  metrics:
    - convergence_efficiency
    - decision_density
    - adaptation_utilization
    - final_utility
