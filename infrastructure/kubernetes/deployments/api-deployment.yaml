##############################################################################
# api-deployment.yaml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : Kubernetes Deployment for the FastAPI integration gateway
##############################################################################

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sfmigration
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: helm
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sfmigration
        app.kubernetes.io/version: "1.0.0"
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # ---------- Scheduling ----------
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: [api-gateway]
                topologyKey: kubernetes.io/hostname

      # ---------- Security ----------
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: api-gateway-sa
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60

      # ---------- Main container ----------
      containers:
        - name: api-gateway
          image: acrsfmigrationprodXXXXXX.azurecr.io/sfmigration-api:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: api-app-config

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: migration-db-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: migration-redis-secret
                  key: redis-url
            - name: SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: salesforce-credentials
                  key: client-id
            - name: SF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: salesforce-credentials
                  key: client-secret
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-signing-secret
                  key: secret-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
              ephemeral-storage: "2Gi"

          startupProbe:
            httpGet:
              path: /livez
              port: http
              scheme: HTTP
            failureThreshold: 20
            periodSeconds: 5
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /livez
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10002
            runAsGroup: 10002
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 512Mi
        - name: config-volume
          configMap:
            name: api-app-config
            defaultMode: 0440
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: api-keyvault-secrets

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: sfmigration
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_API_WORKLOAD_IDENTITY_CLIENT_ID"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: sfmigration-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/component: api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: sfmigration-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 15
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
