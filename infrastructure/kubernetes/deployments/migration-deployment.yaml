##############################################################################
# migration-deployment.yaml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : Kubernetes Deployment for the migration worker service
#           Includes: resource limits, probes, security context,
#           PodDisruptionBudget, HPA, and topology spread constraints
##############################################################################

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: migration-worker
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: migration-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sfmigration
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: helm
  annotations:
    deployment.kubernetes.io/revision: "1"
    reloader.stakater.com/auto: "true"   # Reloader auto-restart on ConfigMap/Secret change
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: migration-worker
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migration-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: sfmigration
        app.kubernetes.io/version: "1.0.0"
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        # Restart hash — updated by Helm on config change
        checksum/config: "{{ .Values.configChecksum }}"
    spec:
      # ---------- Scheduling ----------
      nodeSelector:
        workload-type: migration

      tolerations:
        - key: workload
          operator: Equal
          value: migration
          effect: NoSchedule

      # Spread across availability zones for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: migration-worker
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: migration-worker

      # Avoid co-locating pods on the same node (soft anti-affinity)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: [migration-worker]
                topologyKey: kubernetes.io/hostname

      # ---------- Security ----------
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: migration-worker-sa
      automountServiceAccountToken: true   # Required for workload identity

      # Graceful shutdown: allow in-flight batches to complete
      terminationGracePeriodSeconds: 300

      # ---------- Init containers ----------
      initContainers:
        - name: migration-db-migrate
          image: acrsfmigrationprodXXXXXX.azurecr.io/sfmigration-worker:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "migration.cli", "db", "upgrade"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: migration-db-secret
                  key: database-url
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: migration-app-config
                  key: APP_ENV
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]

      # ---------- Main container ----------
      containers:
        - name: migration-worker
          image: acrsfmigrationprodXXXXXX.azurecr.io/sfmigration-worker:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Environment from ConfigMap (non-sensitive)
          envFrom:
            - configMapRef:
                name: migration-app-config

          # Sensitive environment variables from Secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: migration-db-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: migration-redis-secret
                  key: redis-url
            - name: SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: salesforce-credentials
                  key: client-id
            - name: SF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: salesforce-credentials
                  key: client-secret
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: sasl-password
            # Downward API
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # ---------- Resource constraints ----------
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
              ephemeral-storage: "4Gi"

          # ---------- Probes ----------
          startupProbe:
            httpGet:
              path: /health/startup
              port: health
              scheme: HTTP
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health/live
              port: health
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ---------- Security context ----------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          # ---------- Volume mounts ----------
          volumeMounts:
            - name: tmp-dir
              mountPath: /app/tmp
            - name: logs-dir
              mountPath: /app/logs
            - name: config-volume
              mountPath: /app/config
              readOnly: true
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]   # Allow load balancer to drain

      # ---------- Volumes ----------
      volumes:
        - name: tmp-dir
          emptyDir:
            sizeLimit: 2Gi
        - name: logs-dir
          emptyDir:
            sizeLimit: 1Gi
        - name: config-volume
          configMap:
            name: migration-app-config
            defaultMode: 0440
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: migration-keyvault-secrets

---
# Service Account with workload identity annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-worker-sa
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: migration-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sfmigration
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID"

---
# PodDisruptionBudget — ensure at least 2 replicas during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: migration-worker-pdb
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: migration-worker
    app.kubernetes.io/part-of: sfmigration
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: migration-worker
      app.kubernetes.io/component: worker

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: migration-worker-hpa
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: migration-worker
    app.kubernetes.io/part-of: sfmigration
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: migration-worker
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    # Custom metric: Kafka consumer lag
    - type: External
      external:
        metric:
          name: kafka_consumer_group_lag
          selector:
            matchLabels:
              consumer_group: migration-worker-cg
              topic: migration.jobs
        target:
          type: AverageValue
          averageValue: "100"
