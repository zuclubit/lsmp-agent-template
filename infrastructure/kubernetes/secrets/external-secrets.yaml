##############################################################################
# external-secrets.yaml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : ExternalSecrets operator resources that pull secrets from
#           Azure Key Vault and expose them as Kubernetes Secrets
#           Also includes SecretProviderClass for CSI volume mounts
##############################################################################

---
# ClusterSecretStore — single store pointing at Azure Key Vault
# Uses workload identity (no static credentials stored in cluster)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault-store
  labels:
    app.kubernetes.io/part-of: sfmigration
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://kv-sfmigration-prod-XXXXXX.vault.azure.net/"
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets

---
# ExternalSecret — Database credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: migration-db-secret-sync
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
  annotations:
    # Refresh every 5 minutes
    external-secrets.io/refresh-interval: "5m"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: migration-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      annotations:
        managed-by: external-secrets
      data:
        database-url: >-
          postgresql+asyncpg://{{ .username }}:{{ .password }}@{{ .host }}:5432/{{ .dbname }}
  data:
    - secretKey: username
      remoteRef:
        key: postgres-admin-username
    - secretKey: password
      remoteRef:
        key: postgres-admin-password
    - secretKey: host
      remoteRef:
        key: postgres-server-fqdn
    - secretKey: dbname
      remoteRef:
        key: postgres-database-name

---
# ExternalSecret — Redis credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: migration-redis-secret-sync
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: migration-redis-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        redis-url: "rediss://:{{ .password }}@{{ .host }}:6380/0"
        redis-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: redis-primary-key
    - secretKey: host
      remoteRef:
        key: redis-hostname

---
# ExternalSecret — Salesforce OAuth credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: salesforce-credentials-sync
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: salesforce-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
  data:
    - secretKey: client-id
      remoteRef:
        key: salesforce-connected-app-client-id
    - secretKey: client-secret
      remoteRef:
        key: salesforce-connected-app-client-secret
    - secretKey: username
      remoteRef:
        key: salesforce-integration-username
    - secretKey: private-key-pem
      remoteRef:
        key: salesforce-jwt-private-key

---
# ExternalSecret — API signing secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-signing-secret-sync
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: api-signing-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret-key
      remoteRef:
        key: api-gateway-secret-key
    - secretKey: jwt-private-key
      remoteRef:
        key: api-gateway-jwt-private-key
    - secretKey: jwt-public-key
      remoteRef:
        key: api-gateway-jwt-public-key

---
# ExternalSecret — Kafka SASL credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kafka-credentials-sync
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-store
    kind: ClusterSecretStore
  target:
    name: kafka-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: sasl-username
      remoteRef:
        key: kafka-sasl-username
    - secretKey: sasl-password
      remoteRef:
        key: kafka-sasl-password

---
# SecretProviderClass — CSI driver mount for migration worker
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: migration-keyvault-secrets
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: migration-worker
    app.kubernetes.io/part-of: sfmigration
spec:
  provider: azure
  secretObjects:
    - secretName: migration-db-secret-csi
      type: Opaque
      data:
        - objectName: postgres-admin-password
          key: password
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "REPLACE_WITH_WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "kv-sfmigration-prod-XXXXXX"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: postgres-admin-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-primary-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: salesforce-connected-app-client-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: kafka-sasl-password
          objectType: secret
          objectVersion: ""
    tenantId: "REPLACE_WITH_TENANT_ID"

---
# SecretProviderClass — CSI driver mount for API gateway
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-keyvault-secrets
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: sfmigration
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "REPLACE_WITH_API_WORKLOAD_IDENTITY_CLIENT_ID"
    keyvaultName: "kv-sfmigration-prod-XXXXXX"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: api-gateway-secret-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: api-gateway-jwt-private-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: salesforce-connected-app-client-secret
          objectType: secret
          objectVersion: ""
    tenantId: "REPLACE_WITH_TENANT_ID"
