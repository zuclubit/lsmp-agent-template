##############################################################################
# namespaces.yaml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : Kubernetes namespace definitions with resource quotas and
#           LimitRanges for each environment tier
##############################################################################

---
apiVersion: v1
kind: Namespace
metadata:
  name: sfmigration-dev
  labels:
    app.kubernetes.io/part-of: sfmigration
    environment: dev
    managed-by: terraform
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    scheduler.alpha.kubernetes.io/node-selector: ""

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-resource-quota
  namespace: sfmigration-dev
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    count/pods: "40"
    count/services: "20"
    count/persistentvolumeclaims: "10"
    count/secrets: "50"
    count/configmaps: "50"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limit-range
  namespace: sfmigration-dev
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"

---
apiVersion: v1
kind: Namespace
metadata:
  name: sfmigration-staging
  labels:
    app.kubernetes.io/part-of: sfmigration
    environment: staging
    managed-by: terraform
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-resource-quota
  namespace: sfmigration-staging
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    count/pods: "80"
    count/services: "30"
    count/persistentvolumeclaims: "20"
    count/secrets: "100"
    count/configmaps: "100"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-limit-range
  namespace: sfmigration-staging
spec:
  limits:
    - type: Container
      default:
        cpu: "1000m"
        memory: "1Gi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "10m"
        memory: "64Mi"

---
apiVersion: v1
kind: Namespace
metadata:
  name: sfmigration-prod
  labels:
    app.kubernetes.io/part-of: sfmigration
    environment: prod
    managed-by: terraform
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.29
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    # Prevent accidental deletion
    "helm.sh/resource-policy": keep

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-resource-quota
  namespace: sfmigration-prod
spec:
  hard:
    requests.cpu: "64"
    requests.memory: 128Gi
    limits.cpu: "128"
    limits.memory: 256Gi
    count/pods: "200"
    count/services: "60"
    count/persistentvolumeclaims: "50"
    count/secrets: "200"
    count/configmaps: "200"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit-range
  namespace: sfmigration-prod
spec:
  limits:
    - type: Container
      default:
        cpu: "2000m"
        memory: "2Gi"
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
      max:
        cpu: "16"
        memory: "32Gi"
      min:
        cpu: "50m"
        memory: "64Mi"

---
# Monitoring namespace (shared across environments)
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: sfmigration
    purpose: observability
    managed-by: terraform
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.29
