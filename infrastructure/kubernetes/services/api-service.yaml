##############################################################################
# api-service.yaml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : Kubernetes Service for the FastAPI integration gateway
##############################################################################

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sfmigration-prod
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sfmigration
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    # Enable connection draining for graceful rolling updates
    service.beta.kubernetes.io/azure-load-balancer-tcp-idle-timeout: "30"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: http    # TLS terminated at ingress; pod speaks HTTP
      protocol: TCP
  sessionAffinity: None

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: sfmigration
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - sfmigration-prod
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      scheme: http
