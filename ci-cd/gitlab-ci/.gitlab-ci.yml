##############################################################################
# .gitlab-ci.yml
# Project : Legacy-to-Salesforce Migration Platform
# Purpose : Full GitLab CI/CD pipeline with stages:
#           validate → build → test → security → deploy-staging → deploy-prod
##############################################################################

# ---- Global configuration ---------------------------------------------------

image: python:3.12-slim-bookworm

stages:
  - validate
  - build
  - test
  - security
  - publish
  - deploy-staging
  - deploy-prod
  - notify

variables:
  # Docker
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  # Registry
  REGISTRY: "${CI_REGISTRY}"
  REGISTRY_IMAGE_MIGRATION: "${CI_REGISTRY_IMAGE}/sfmigration-worker"
  REGISTRY_IMAGE_API: "${CI_REGISTRY_IMAGE}/sfmigration-api"
  # Image tag strategy
  IMAGE_TAG: "sha-${CI_COMMIT_SHORT_SHA}"
  # Terraform
  TF_VERSION: "1.7.5"
  TF_ROOT: "${CI_PROJECT_DIR}/infrastructure/terraform"
  # Python
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.pip-cache"
  # Kubernetes
  NAMESPACE_STAGING: "sfmigration-staging"
  NAMESPACE_PROD: "sfmigration-prod"

# Cache Python packages across jobs
cache:
  key: "pip-${CI_COMMIT_REF_SLUG}"
  paths:
    - .pip-cache/
    - .terraform/

# Default before_script for Python jobs
.python-setup: &python-setup
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl git
    - pip install --upgrade pip
    - pip install -r requirements.txt -r requirements-api.txt -r requirements-migration.txt

# Reusable job template: only on MR or default branch
.only-relevant-branches: &only-relevant-branches
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ============================================================================
# STAGE: validate
# ============================================================================

validate:lint:
  stage: validate
  <<: *only-relevant-branches
  <<: *python-setup
  script:
    - pip install ruff black isort mypy
    - echo "Running ruff..."
    - ruff check src/ tests/
    - echo "Running black..."
    - black --check --diff src/ tests/
    - echo "Running isort..."
    - isort --check-only --diff src/ tests/
    - echo "Running mypy..."
    - mypy src/ --ignore-missing-imports
  artifacts:
    when: always
    paths:
      - ruff-results.json
    expire_in: 1 week
  tags:
    - docker

validate:terraform-lint:
  stage: validate
  image: hashicorp/terraform:1.7.5
  <<: *only-relevant-branches
  script:
    - cd "${TF_ROOT}"
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate
  tags:
    - docker

validate:k8s-lint:
  stage: validate
  image: bitnami/kubectl:1.29
  <<: *only-relevant-branches
  script:
    - kubectl apply --dry-run=client -f infrastructure/kubernetes/namespaces.yaml
    - for f in infrastructure/kubernetes/**/*.yaml; do
        echo "Validating $f...";
        kubectl apply --dry-run=client -f "$f" || true;
      done
  tags:
    - docker

validate:dockerfile-lint:
  stage: validate
  image: hadolint/hadolint:latest-debian
  <<: *only-relevant-branches
  script:
    - hadolint infrastructure/docker/Dockerfile.migration --format json > hadolint-migration.json || true
    - hadolint infrastructure/docker/Dockerfile.api --format json > hadolint-api.json || true
    - cat hadolint-migration.json
    - cat hadolint-api.json
  artifacts:
    when: always
    paths:
      - hadolint-migration.json
      - hadolint-api.json
    expire_in: 1 week
  tags:
    - docker

# ============================================================================
# STAGE: build
# ============================================================================

build:migration-image:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  <<: *only-relevant-branches
  script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - docker buildx create --use --name multiplatform-builder
    - docker buildx build
        --platform linux/amd64
        --file infrastructure/docker/Dockerfile.migration
        --build-arg BUILD_VERSION="${IMAGE_TAG}"
        --build-arg GIT_COMMIT="${CI_COMMIT_SHA}"
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        --tag "${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}"
        --tag "${REGISTRY_IMAGE_MIGRATION}:${CI_COMMIT_REF_SLUG}"
        --cache-from "type=registry,ref=${REGISTRY_IMAGE_MIGRATION}:cache"
        --cache-to "type=registry,ref=${REGISTRY_IMAGE_MIGRATION}:cache,mode=max"
        --push
        .
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  artifacts:
    reports:
      dotenv: build-migration.env
  after_script:
    - echo "MIGRATION_IMAGE_TAG=${IMAGE_TAG}" > build-migration.env
  tags:
    - docker-privileged

build:api-image:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  <<: *only-relevant-branches
  script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - docker buildx create --use --name multiplatform-builder
    - docker buildx build
        --platform linux/amd64
        --file infrastructure/docker/Dockerfile.api
        --build-arg BUILD_VERSION="${IMAGE_TAG}"
        --build-arg GIT_COMMIT="${CI_COMMIT_SHA}"
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        --tag "${REGISTRY_IMAGE_API}:${IMAGE_TAG}"
        --tag "${REGISTRY_IMAGE_API}:${CI_COMMIT_REF_SLUG}"
        --cache-from "type=registry,ref=${REGISTRY_IMAGE_API}:cache"
        --cache-to "type=registry,ref=${REGISTRY_IMAGE_API}:cache,mode=max"
        --push
        .
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  tags:
    - docker-privileged

# ============================================================================
# STAGE: test
# ============================================================================

test:unit:
  stage: test
  <<: *only-relevant-branches
  <<: *python-setup
  script:
    - pip install -r requirements-test.txt
    - python -m pytest tests/unit/
        -v
        --tb=short
        --cov=src
        --cov-report=xml:coverage.xml
        --cov-report=html:coverage-html
        --cov-fail-under=80
        --junitxml=unit-test-results.xml
        -n auto
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: unit-test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage-html/
      - coverage.xml
    expire_in: 2 weeks
  tags:
    - docker

test:integration:
  stage: test
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  <<: *only-relevant-branches
  script:
    - apk add --no-cache docker-compose
    - mkdir -p test-results
    - docker-compose
        -f infrastructure/docker/docker-compose.test.yml
        up
        --build
        --abort-on-container-exit
        --exit-code-from integration-tests
        --timeout 600
  after_script:
    - docker-compose
        -f infrastructure/docker/docker-compose.test.yml
        logs integration-tests > test-results/integration-logs.txt 2>&1 || true
    - docker-compose
        -f infrastructure/docker/docker-compose.test.yml
        down -v --remove-orphans
  artifacts:
    when: always
    paths:
      - test-results/
    reports:
      junit: test-results/integration-results.xml
    expire_in: 2 weeks
  tags:
    - docker-privileged

# ============================================================================
# STAGE: security
# ============================================================================

security:sast-bandit:
  stage: security
  <<: *only-relevant-branches
  <<: *python-setup
  script:
    - pip install bandit[toml]
    - bandit -r src/ -f json -o bandit-results.json --exit-zero
    - bandit -r src/ -f sarif -o gl-sast-bandit.json --exit-zero
    - echo "Bandit scan complete"
  artifacts:
    when: always
    reports:
      sast: gl-sast-bandit.json
    paths:
      - bandit-results.json
    expire_in: 1 month
  tags:
    - docker

security:sast-semgrep:
  stage: security
  image: returntocorp/semgrep:1.65.0
  <<: *only-relevant-branches
  script:
    - semgrep ci
        --config=p/python
        --config=p/secrets
        --config=p/owasp-top-ten
        --json
        --output=semgrep-results.json
        --sarif
        --output=semgrep.sarif
        || true
  artifacts:
    when: always
    reports:
      sast: semgrep-results.json
    paths:
      - semgrep.sarif
    expire_in: 1 month
  tags:
    - docker

security:dependency-scan:
  stage: security
  <<: *only-relevant-branches
  <<: *python-setup
  script:
    - pip install pip-audit safety
    - pip-audit --format json -o pip-audit-results.json --strict || true
    - safety check --json -o safety-results.json || true
  artifacts:
    when: always
    paths:
      - pip-audit-results.json
      - safety-results.json
    expire_in: 1 month
  tags:
    - docker

security:trivy-migration:
  stage: security
  image: aquasec/trivy:0.50.1
  <<: *only-relevant-branches
  variables:
    TRIVY_USERNAME: "${CI_REGISTRY_USER}"
    TRIVY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    TRIVY_AUTH_URL: "${CI_REGISTRY}"
  script:
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format sarif
        --output trivy-migration.sarif
        "${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}"
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format json
        --output trivy-migration.json
        "${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}"
  artifacts:
    when: always
    reports:
      container_scanning: trivy-migration.json
    paths:
      - trivy-migration.sarif
    expire_in: 1 month
  needs:
    - build:migration-image
  tags:
    - docker

security:trivy-api:
  stage: security
  image: aquasec/trivy:0.50.1
  <<: *only-relevant-branches
  variables:
    TRIVY_USERNAME: "${CI_REGISTRY_USER}"
    TRIVY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
    TRIVY_AUTH_URL: "${CI_REGISTRY}"
  script:
    - trivy image
        --exit-code 0
        --severity HIGH,CRITICAL
        --format json
        --output trivy-api.json
        "${REGISTRY_IMAGE_API}:${IMAGE_TAG}"
  artifacts:
    when: always
    reports:
      container_scanning: trivy-api.json
    expire_in: 1 month
  needs:
    - build:api-image
  tags:
    - docker

security:secret-detection:
  stage: security
  image: gitleaks/gitleaks:v8.18.2
  <<: *only-relevant-branches
  script:
    - gitleaks detect
        --source .
        --report-format json
        --report-path gitleaks-report.json
        --exit-code 0
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 1 month
  tags:
    - docker

security:checkov-iac:
  stage: security
  image: bridgecrew/checkov:3.2.0
  <<: *only-relevant-branches
  script:
    - checkov
        -d infrastructure/terraform/
        --framework terraform
        --output json
        --output-file checkov-tf.json
        --soft-fail || true
    - checkov
        -d infrastructure/kubernetes/
        --framework kubernetes
        --output json
        --output-file checkov-k8s.json
        --soft-fail || true
  artifacts:
    when: always
    paths:
      - checkov-tf.json
      - checkov-k8s.json
    expire_in: 1 month
  tags:
    - docker

# ============================================================================
# STAGE: publish
# ============================================================================

publish:tag-latest:
  stage: publish
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - docker pull "${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}"
    - docker tag "${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}" "${REGISTRY_IMAGE_MIGRATION}:latest"
    - docker push "${REGISTRY_IMAGE_MIGRATION}:latest"
    - docker pull "${REGISTRY_IMAGE_API}:${IMAGE_TAG}"
    - docker tag "${REGISTRY_IMAGE_API}:${IMAGE_TAG}" "${REGISTRY_IMAGE_API}:latest"
    - docker push "${REGISTRY_IMAGE_API}:latest"
  tags:
    - docker-privileged

# ============================================================================
# STAGE: deploy-staging
# ============================================================================

deploy-staging:terraform-plan:
  stage: deploy-staging
  image: hashicorp/terraform:1.7.5
  environment:
    name: staging/terraform-plan
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - cd "${TF_ROOT}"
    - terraform init
        -backend-config="key=sfmigration-staging.terraform.tfstate"
        -reconfigure
    - terraform plan
        -var-file="environments/staging/terraform.tfvars"
        -var="subscription_id=${ARM_SUBSCRIPTION_ID_STAGING}"
        -var="tenant_id=${ARM_TENANT_ID}"
        -out=tfplan.staging
        -no-color
        2>&1 | tee plan-output.txt
  artifacts:
    paths:
      - "${TF_ROOT}/tfplan.staging"
      - "${TF_ROOT}/plan-output.txt"
    expire_in: 3 days
  variables:
    ARM_SUBSCRIPTION_ID: "${ARM_SUBSCRIPTION_ID_STAGING}"
    ARM_TENANT_ID: "${ARM_TENANT_ID}"
    ARM_CLIENT_ID: "${ARM_CLIENT_ID}"
    ARM_USE_OIDC: "true"
  tags:
    - docker

deploy-staging:terraform-apply:
  stage: deploy-staging
  image: hashicorp/terraform:1.7.5
  environment:
    name: staging
    url: "${STAGING_API_URL}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: false
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - cd "${TF_ROOT}"
    - terraform init
        -backend-config="key=sfmigration-staging.terraform.tfstate"
        -reconfigure
    - terraform apply -auto-approve tfplan.staging
  needs:
    - job: deploy-staging:terraform-plan
      artifacts: true
  variables:
    ARM_SUBSCRIPTION_ID: "${ARM_SUBSCRIPTION_ID_STAGING}"
    ARM_TENANT_ID: "${ARM_TENANT_ID}"
    ARM_CLIENT_ID: "${ARM_CLIENT_ID}"
    ARM_USE_OIDC: "true"
  tags:
    - docker

deploy-staging:k8s:
  stage: deploy-staging
  image: bitnami/kubectl:1.29
  environment:
    name: staging
    url: "${STAGING_API_URL}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "${KUBE_CONFIG_STAGING}" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - |
      kubectl set image deployment/migration-worker \
        migration-worker="${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}" \
        -n "${NAMESPACE_STAGING}"
      kubectl set image deployment/api-gateway \
        api-gateway="${REGISTRY_IMAGE_API}:${IMAGE_TAG}" \
        -n "${NAMESPACE_STAGING}"
    - kubectl rollout status deployment/migration-worker -n "${NAMESPACE_STAGING}" --timeout=600s
    - kubectl rollout status deployment/api-gateway -n "${NAMESPACE_STAGING}" --timeout=300s
  tags:
    - docker

deploy-staging:smoke-tests:
  stage: deploy-staging
  <<: *python-setup
  script:
    - pip install -r requirements-test.txt
    - python -m pytest tests/smoke/ -v -k "staging" --junitxml=smoke-staging.xml
  artifacts:
    when: always
    reports:
      junit: smoke-staging.xml
    expire_in: 1 week
  needs:
    - deploy-staging:k8s
  tags:
    - docker

# ============================================================================
# STAGE: deploy-prod
# ============================================================================

deploy-prod:terraform-plan:
  stage: deploy-prod
  image: hashicorp/terraform:1.7.5
  environment:
    name: production/terraform-plan
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - cd "${TF_ROOT}"
    - terraform init
        -backend-config="key=sfmigration-prod.terraform.tfstate"
        -reconfigure
    - terraform plan
        -var-file="environments/prod/terraform.tfvars"
        -var="subscription_id=${ARM_SUBSCRIPTION_ID_PROD}"
        -var="tenant_id=${ARM_TENANT_ID}"
        -out=tfplan.prod
        -no-color
  artifacts:
    paths:
      - "${TF_ROOT}/tfplan.prod"
    expire_in: 1 day
  variables:
    ARM_SUBSCRIPTION_ID: "${ARM_SUBSCRIPTION_ID_PROD}"
    ARM_TENANT_ID: "${ARM_TENANT_ID}"
    ARM_CLIENT_ID: "${ARM_CLIENT_ID}"
    ARM_USE_OIDC: "true"
  tags:
    - docker

deploy-prod:terraform-apply:
  stage: deploy-prod
  image: hashicorp/terraform:1.7.5
  environment:
    name: production
    url: "${PROD_API_URL}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - cd "${TF_ROOT}"
    - terraform init
        -backend-config="key=sfmigration-prod.terraform.tfstate"
        -reconfigure
    - terraform apply -auto-approve tfplan.prod
  needs:
    - job: deploy-prod:terraform-plan
      artifacts: true
    - deploy-staging:smoke-tests
  variables:
    ARM_SUBSCRIPTION_ID: "${ARM_SUBSCRIPTION_ID_PROD}"
    ARM_TENANT_ID: "${ARM_TENANT_ID}"
    ARM_CLIENT_ID: "${ARM_CLIENT_ID}"
    ARM_USE_OIDC: "true"
  tags:
    - docker

deploy-prod:k8s:
  stage: deploy-prod
  image: bitnami/kubectl:1.29
  environment:
    name: production
    url: "${PROD_API_URL}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  script:
    - echo "${KUBE_CONFIG_PROD}" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - |
      PREVIOUS_MIGRATION=$(kubectl get deployment migration-worker \
        -n "${NAMESPACE_PROD}" \
        -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
      PREVIOUS_API=$(kubectl get deployment api-gateway \
        -n "${NAMESPACE_PROD}" \
        -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
      echo "PREVIOUS_MIGRATION_IMAGE=${PREVIOUS_MIGRATION}" > deploy-state.env
      echo "PREVIOUS_API_IMAGE=${PREVIOUS_API}" >> deploy-state.env
    - kubectl set image deployment/migration-worker
        migration-worker="${REGISTRY_IMAGE_MIGRATION}:${IMAGE_TAG}"
        -n "${NAMESPACE_PROD}"
    - kubectl set image deployment/api-gateway
        api-gateway="${REGISTRY_IMAGE_API}:${IMAGE_TAG}"
        -n "${NAMESPACE_PROD}"
    - kubectl rollout status deployment/migration-worker -n "${NAMESPACE_PROD}" --timeout=900s
    - kubectl rollout status deployment/api-gateway -n "${NAMESPACE_PROD}" --timeout=300s
  artifacts:
    reports:
      dotenv: deploy-state.env
  needs:
    - deploy-prod:terraform-apply
  tags:
    - docker

deploy-prod:smoke-tests:
  stage: deploy-prod
  <<: *python-setup
  script:
    - pip install -r requirements-test.txt
    - python -m pytest tests/smoke/ -v -k "production" --junitxml=smoke-prod.xml
  artifacts:
    when: always
    reports:
      junit: smoke-prod.xml
    expire_in: 1 month
  needs:
    - deploy-prod:k8s
  tags:
    - docker

deploy-prod:rollback:
  stage: deploy-prod
  image: bitnami/kubectl:1.29
  when: on_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "${KUBE_CONFIG_PROD}" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - echo "Rolling back production deployment..."
    - kubectl rollout undo deployment/migration-worker -n "${NAMESPACE_PROD}"
    - kubectl rollout undo deployment/api-gateway -n "${NAMESPACE_PROD}"
    - kubectl rollout status deployment/migration-worker -n "${NAMESPACE_PROD}" --timeout=300s
    - kubectl rollout status deployment/api-gateway -n "${NAMESPACE_PROD}" --timeout=180s
    - echo "Rollback completed."
  needs:
    - deploy-prod:smoke-tests
  tags:
    - docker

# ============================================================================
# STAGE: notify
# ============================================================================

notify:success:
  stage: notify
  image: curlimages/curl:8.6.0
  when: on_success
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      curl -s -X POST "${SLACK_DEPLOYMENT_WEBHOOK}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"text\": \":rocket: *Production deployment SUCCESSFUL* — ${CI_PROJECT_NAME}\",
          \"attachments\": [{
            \"color\": \"good\",
            \"fields\": [
              {\"title\": \"Branch\", \"value\": \"${CI_COMMIT_BRANCH}\", \"short\": true},
              {\"title\": \"Image Tag\", \"value\": \"${IMAGE_TAG}\", \"short\": true},
              {\"title\": \"Pipeline\", \"value\": \"${CI_PIPELINE_URL}\", \"short\": false}
            ]
          }]
        }"
  tags:
    - docker

notify:failure:
  stage: notify
  image: curlimages/curl:8.6.0
  when: on_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      curl -s -X POST "${SLACK_DEPLOYMENT_WEBHOOK}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"text\": \":x: *Pipeline FAILED* — ${CI_PROJECT_NAME}\",
          \"attachments\": [{
            \"color\": \"danger\",
            \"fields\": [
              {\"title\": \"Branch\", \"value\": \"${CI_COMMIT_BRANCH}\", \"short\": true},
              {\"title\": \"Actor\", \"value\": \"${GITLAB_USER_NAME}\", \"short\": true},
              {\"title\": \"Pipeline\", \"value\": \"${CI_PIPELINE_URL}\", \"short\": false}
            ]
          }]
        }"
  tags:
    - docker
