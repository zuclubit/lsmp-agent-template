tool:
  name: api-client-tool
  version: "1.0.0"
  classification: INTERNAL
  description: >
    HTTP client tool for calling the internal migration control-plane API,
    Salesforce Bulk API 2.0, and supporting services (Prometheus, Kafka Connect).
    Supports GET, POST, PUT, PATCH. Egress is restricted to the allowed_hosts list.
    Payloads are never logged due to potential PII content.

access_control:
  default_policy: DENY
  allowed_agents:
    - orchestrator-agent
    - validation-agent
    - execution-agent
    - debugging-agent
  # Note: debugging-agent is further restricted to GET-only at the agent config layer
  require_authentication: true
  require_audit_log: true

network:
  network_access: true
  allowed_hosts:
    - salesforce.com
    - "*.salesforce.com"
    - api.migration.internal
    - kafka-connect.platform-kafka.svc.cluster.local
    - prometheus.internal
  blocked_hosts:
    - "169.254.169.254"   # AWS IMDSv1 metadata endpoint
    - "metadata.google.internal"
    - "100.100.100.200"   # Alibaba Cloud metadata
  dns_rebinding_protection: true
  tls_verification: strict
  min_tls_version: "1.2"

sandboxing:
  enabled: true
  network_access: true
  filesystem_access: none
  max_memory_mb: 256
  max_execution_time_seconds: 30
  allowed_system_calls:
    - read
    - write
    - socket
    - connect
    - close
    - poll
    - epoll_wait
    - sendto
    - recvfrom
    - getsockopt
    - setsockopt

input_validation:
  schema_validation: strict
  max_payload_size_kb: 1024
  forbidden_patterns:
    - "DROP\\s+TABLE"
    - "DELETE\\s+FROM"
    - "INSERT\\s+INTO"
    - "UPDATE\\s+\\w+\\s+SET"
    - "EXEC\\s*\\("
    - "eval\\("
    - "__import__"
    - "MERGE\\s+INTO"
    - "GRANT\\s+"
    - "TRUNCATE\\s+TABLE"
  sanitize_before_execution: true

output_sanitization:
  strip_credentials: true
  strip_pii: true
  never_log_payloads: true   # payloads may contain PII — hash only
  max_output_size_kb: 512
  redact_patterns:
    - pattern: "[A-Za-z0-9+/]{40,}"
      replacement: "[REDACTED_SECRET]"
    - pattern: "sk-ant-[A-Za-z0-9]+"
      replacement: "[REDACTED_API_KEY]"
    - pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z]{2,}\\b"
      replacement: "[REDACTED_EMAIL]"
    - pattern: "Bearer [A-Za-z0-9._\\-]+"
      replacement: "Bearer [REDACTED_TOKEN]"
    - pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      replacement: "[REDACTED_SSN]"

rate_limiting:
  calls_per_minute: 500
  calls_per_agent_per_minute: 100
  burst_limit: 50

audit:
  log_all_calls: true
  log_caller_agent: true
  log_input_hash: true
  log_output_summary: true
  log_execution_time: true
  alert_on_anomaly: true
  # Payloads logged as SHA-256 hash only — never plaintext
  payload_logging: hash_only

circuit_breaker:
  enabled: true
  failure_threshold: 3
  reset_timeout_seconds: 60
